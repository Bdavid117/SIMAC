services:
  db:
    image: postgres:15-alpine
    container_name: simac-db
    environment:
      POSTGRES_DB: simac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simac"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simac-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/simac
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: simac-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:

